name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow qrcode win11toast pystray pywin32 pyinstaller

      - name: Build Executable
        working-directory: ./windows
        run: |
          pyinstaller ClipboardBridge.spec

      - name: Package Windows Release
        shell: pwsh
        run: |
          Compress-Archive -Path "windows/dist/ClipboardBridge.exe", "windows/icon.png" -DestinationPath "ClipboardBridge-Windows.zip"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: ClipboardBridge-Windows.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission to Gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Build APKs
        working-directory: ./android
        run: ./gradlew assembleDebug assembleRelease

      - name: Prepare APKs
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk ClipboardBridge-Android-Debug.apk
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk ClipboardBridge-Android-Release-Unsigned.apk

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            ClipboardBridge-Android-Debug.apk
            ClipboardBridge-Android-Release-Unsigned.apk

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClipboardBridge-Windows.zip
            ClipboardBridge-Android-Debug.apk
            ClipboardBridge-Android-Release-Unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
