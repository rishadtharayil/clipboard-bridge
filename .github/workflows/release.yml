name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow qrcode win11toast pystray pywin32 pyinstaller cryptography customtkinter

      - name: Build Executable
        working-directory: ./windows
        run: |
          pyinstaller ClipboardBridge.spec

      - name: Package Windows Release
        shell: pwsh
        run: |
          Compress-Archive -Path "windows/dist/ClipboardBridge.exe" -DestinationPath "ClipboardBridge-Windows.zip"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: ClipboardBridge-Windows.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant Execute Permission to Gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Build APKs
        working-directory: ./android
        run: ./gradlew assembleDebug assembleRelease

      - name: Prepare Debug APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ClipboardBridge-Android-Debug.apk

      - name: Sign Release APK
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          ALIAS: ${{ secrets.ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "Signing Key secret found. Signing release APK..."
            echo "$SIGNING_KEY" | base64 -d > release.keystore
            APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort | tail -n 1)
            $APKSIGNER sign --ks release.keystore \
              --ks-key-alias "$ALIAS" \
              --ks-pass pass:"$KEYSTORE_PASSWORD" \
              --key-pass pass:"$KEY_PASSWORD" \
              --out ClipboardBridge-Android-Release.apk \
              android/app/build/outputs/apk/release/app-release-unsigned.apk
            rm release.keystore
            echo "Release APK signed successfully."
          else
            echo "Signing Key secret not found. Falling back to copying unsigned APK."
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk ClipboardBridge-Android-Release.apk
          fi

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            ClipboardBridge-Android-Debug.apk
            ClipboardBridge-Android-Release.apk

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClipboardBridge-Windows.zip
            ClipboardBridge-Android-Debug.apk
            ClipboardBridge-Android-Release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
